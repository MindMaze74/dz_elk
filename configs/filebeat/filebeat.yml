filebeat.inputs:
- type: log
  enabled: true
  paths:
    - /var/log/nginx/access.log
  tags: ["nginx-access", "filebeat"]

output.elasticsearch:
  hosts: ['elasticsearch:9200']
  index: "nginx-logs-filebeat-%{+yyyy.MM.dd}"

setup.template.name: "nginx-logs-filebeat"
setup.template.pattern: "nginx-logs-filebeat-*"
setup.ilm.enabled: false

processors:
  - add_host_metadata: ~
  - add_docker_metadata: ~
